<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Privacy Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 360px;
      min-height: 480px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }

    .header {
      background: linear-gradient(135deg, #1e3a5f 0%, #0f172a 100%);
      padding: 16px 20px;
      border-bottom: 1px solid #1e293b;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-title {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .shield-icon {
      width: 28px;
      height: 28px;
      background: #3b82f6;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    h1 {
      font-size: 14px;
      font-weight: 600;
      color: #f1f5f9;
    }

    h2 {
      font-size: 11px;
      font-weight: 400;
      color: #94a3b8;
    }

    .stats-bar {
      display: flex;
      padding: 12px 20px;
      gap: 12px;
      background: #1e293b;
      border-bottom: 1px solid #334155;
    }

    .stat-item {
      flex: 1;
      text-align: center;
    }

    .stat-number {
      font-size: 22px;
      font-weight: 700;
      color: #f97316;
    }

    .stat-label {
      font-size: 10px;
      color: #94a3b8;
      margin-top: 2px;
    }

    .section-header {
      padding: 10px 20px 6px;
      font-size: 11px;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .clear-btn {
      background: none;
      border: 1px solid #334155;
      color: #64748b;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 4px;
      cursor: pointer;
    }

    .clear-btn:hover {
      border-color: #ef4444;
      color: #ef4444;
    }

    .events-list {
      max-height: 310px;
      overflow-y: auto;
      padding: 4px 0;
    }

    .events-list::-webkit-scrollbar {
      width: 4px;
    }

    .events-list::-webkit-scrollbar-track {
      background: #0f172a;
    }

    .events-list::-webkit-scrollbar-thumb {
      background: #334155;
      border-radius: 2px;
    }

    .event-item {
      padding: 8px 20px;
      border-bottom: 1px solid #1e293b;
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .event-item:hover {
      background: #1e293b;
    }

    .risk-badge {
      font-size: 9px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 3px;
      text-transform: uppercase;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .risk-high {
      background: #450a0a;
      color: #fca5a5;
    }

    .risk-medium {
      background: #431407;
      color: #fdba74;
    }

    .risk-low {
      background: #052e16;
      color: #86efac;
    }

    .event-details {
      flex: 1;
      min-width: 0;
    }

    .event-tracker {
      font-size: 12px;
      font-weight: 500;
      color: #e2e8f0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .event-meta {
      font-size: 10px;
      color: #64748b;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .event-time {
      font-size: 10px;
      color: #475569;
      flex-shrink: 0;
    }

    .empty-state {
      padding: 40px 20px;
      text-align: center;
      color: #475569;
    }

    .empty-state .icon {
      font-size: 36px;
      margin-bottom: 12px;
    }

    .empty-state p {
      font-size: 13px;
      line-height: 1.5;
    }

    .footer {
      padding: 10px 20px;
      border-top: 1px solid #1e293b;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .dashboard-link {
      font-size: 11px;
      color: #3b82f6;
      text-decoration: none;
      cursor: pointer;
      background: none;
      border: none;
    }

    .dashboard-link:hover {
      color: #60a5fa;
      text-decoration: underline;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #22c55e;
      display: inline-block;
      margin-right: 6px;
    }

    .status-text {
      font-size: 10px;
      color: #64748b;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-title">
      <div class="shield-icon">🛡</div>
      <div>
        <h1>Privacy Dashboard</h1>
        <h2>Tracker Detection Active</h2>
      </div>
    </div>
  </div>

  <div class="stats-bar">
    <div class="stat-item">
      <div class="stat-number" id="total-count">0</div>
      <div class="stat-label">Trackers Found</div>
    </div>
    <div class="stat-item">
      <div class="stat-number" id="session-count">0</div>
      <div class="stat-label">This Session</div>
    </div>
  </div>

  <div class="section-header">
    Recent Detections
    <button class="clear-btn" id="clear-btn">Clear</button>
  </div>

  <div class="events-list" id="events-list">
    <div class="empty-state">
      <div class="icon">👁</div>
      <p>No trackers detected yet.<br/>Browse some websites to see results.</p>
    </div>
  </div>

  <div class="footer">
    <div>
      <span class="status-dot"></span>
      <span class="status-text">Monitoring active</span>
    </div>
    <button class="dashboard-link" id="open-dashboard">Open Full Dashboard →</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
